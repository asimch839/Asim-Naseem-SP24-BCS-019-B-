name: task_manager_app
description: Task Management Application for Mid-Term
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  cupertino_icons: ^1.0.5
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.8.4
  intl: ^0.18.1
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.3
  csv: ^5.1.1
  pdf: ^3.11.1
  flutter_email_sender: ^6.0.3
  printing: ^5.12.0
  share_plus: ^7.2.2
  universal_html: ^2.2.4
  shared_preferences: ^2.3.3
  percent_indicator: ^4.2.3
  permission_handler: ^12.0.1
  file_picker: ^8.0.0
  flutter_ringtone_player: ^4.0.0+4
  audioplayers: ^6.5.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1  # Add this for app icons

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/ding.mp3
    - assets/sounds/chime.mp3
    - assets/sounds/alert.mp3
    - assets/sounds/cool.mp3
    - assets/sounds/urgent.mp3
    - assets/images/profile.jpeg
    - assets/images/icon.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
